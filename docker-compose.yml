services:
  code-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: code-server:local
    container_name: code-server
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${PORT:-8929}:8080"
    environment:
      - PASSWORD=${PASSWORD:?PASSWORD is required}
      - TZ=${TZ:-Asia/Singapore}
      - HOME=/home/coder
      - SHELL=/usr/bin/zsh
      - UPDATE_ON_START=${UPDATE_ON_START:-1}
      - HTTPS=${HTTPS:-0}
    volumes:
      - ${DATA_DIR:-./data/home}:/home/coder
      - ${PROJECTS_DIR:-./data/projects}:/home/coder/dev/projects
    restart: unless-stopped
